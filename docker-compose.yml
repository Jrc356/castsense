services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    container_name: castsense-backend
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    container_name: castsense-web
    environment:
      NODE_ENV: development
      VITE_BACKEND_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  backend_node_modules:
  web_node_modules:

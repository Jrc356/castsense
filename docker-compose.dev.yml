# ─────────────────────────────────────────────────────────────────────────────
# CastSense Development Docker Compose Override
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This override provides:
#   - Volume mount for hot-reload development
#   - Development environment settings
#   - No production optimizations
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      target: dev  # Use dev stage which includes installed dependencies
    container_name: castsense-backend-dev
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      # Mount source for hot-reload
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      # Note: do NOT mount /app/node_modules here so the image-provided
      # node_modules (built in the `dev` image) are available inside the
      # container. This avoids missing-dependency errors on cold starts.
    # Override command for development with hot-reload
    command: ["npx", "tsx", "watch", "src/index.ts"]
